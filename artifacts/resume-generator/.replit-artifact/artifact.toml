kind = "web"
previewPath = "/"
title = "Resume Generator"
version = "1.0.0"
id = "artifacts/resume-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19827

[services.development]
run = "pnpm --filter @workspace/resume-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-generator", "run", "build" ]
publicDir = "artifacts/resume-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19827"
BASE_PATH = "/"
